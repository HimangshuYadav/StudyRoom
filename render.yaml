services:
  - type: web
    name: studyroom
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false
